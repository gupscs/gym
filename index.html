<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Treino Tracker</title>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#f4f6f8;
padding-bottom:90px;
}

.brand{
padding:20px;
font-size:24px;
font-weight:600;
text-align:center;
}

.card-panel{
border-radius:18px;
}

.exercise-card{
border-radius:16px;
margin-bottom:14px;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:12px;
box-shadow:0 -2px 8px rgba(0,0,0,.12);
}

.hidden{
display:none;
}

</style>

</head>
<body>

<div class="container">

<div class="brand blue-text">
Treino Tracker
</div>


<div class="row">

<div class="col s6">
<div class="card-panel center">
<h5 id="volumeTotal">0</h5>
Volume
</div>
</div>

<div class="col s6">
<div class="card-panel center">
<h5 id="corridaTotal">0</h5>
Km
</div>
</div>

</div>



<!-- TREINOS -->
<div id="screenTreinos">

<div id="diasAbas"></div>

<br>

<div id="treinoDia"></div>

</div>



<!-- REGISTRAR -->
<div id="screenRegistrar" class="hidden">

<div class="card-panel white">

<div class="input-field">
<select id="diaSelect"></select>
<label>Dia</label>
</div>

<div id="formRegistro"></div>

</div>

</div>



<!-- DASH -->
<div id="screenDash" class="hidden">

<div class="card-panel white">
<canvas id="chartCarga"></canvas>
</div>

<br>

<div class="card-panel white">
<canvas id="chartCorrida"></canvas>
</div>

</div>


</div>


<div class="bottom-nav">

<a onclick="trocarTela('treinos')">
<i class="material-icons">
fitness_center
</i>
</a>

<a onclick="trocarTela('registrar')">
<i class="material-icons">
edit
</i>
</a>

<a onclick="trocarTela('dash')">
<i class="material-icons">
bar_chart
</i>
</a>

<a onclick="syncSheets()">
<i class="material-icons">
sync
</i>
</a>

</div>


<script
src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js">
</script>

<script src="app.js"></script>

</body>
</html>
