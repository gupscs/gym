<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<title>Treino App</title>

<!-- Material Design -->
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#f4f6f8;
padding-bottom:80px;
}

.brand{
padding:20px;
font-size:24px;
font-weight:600;
}

.card-panel{
border-radius:18px;
}

.exercise-card{
border-radius:16px;
margin-bottom:15px;
}

.metric{
font-size:28px;
font-weight:bold;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
box-shadow:0 -2px 8px rgba(0,0,0,.12);
}

.hidden{
display:none;
}

.tab-chip{
margin:5px;
}

input{
font-size:18px !important;
}

</style>

</head>
<body>

<div class="container">

<div class="brand center blue-text">
Treino Tracker
</div>


<!-- HOME KPIs -->
<div class="row">

<div class="col s6">
<div class="card-panel white center">
<div class="metric blue-text" id="volumeTotal">
0
</div>
Volume
</div>
</div>

<div class="col s6">
<div class="card-panel white center">
<div class="metric green-text" id="corridaTotal">
0
</div>
Km
</div>
</div>

</div>



<!-- TREINOS -->
<div id="screenTreinos">

<div id="diasAbas"></div>

<div id="treinoDia"></div>

</div>


<!-- REGISTRAR -->
<div id="screenRegistrar" class="hidden">

<div class="card-panel white">

<div class="input-field">
<select id="diaSelect"></select>
<label>Dia</label>
</div>

<div id="formRegistro"></div>

</div>

</div>


<!-- DASHBOARD -->
<div id="screenDash" class="hidden">

<div class="card-panel white">
<canvas id="chartCarga"></canvas>
</div>

<br>

<div class="card-panel white">
<canvas id="chartCorrida"></canvas>
</div>

</div>

</div>


<!-- Bottom Nav -->
<div class="bottom-nav">

<a onclick="trocarTela('treinos')">
<i class="material-icons">fitness_center</i>
</a>

<a onclick="trocarTela('registrar')">
<i class="material-icons">edit</i>
</a>

<a onclick="trocarTela('dash')">
<i class="material-icons">bar_chart</i>
</a>

<a onclick="syncSheets()">
<i class="material-icons">sync</i>
</a>

</div>


<script
src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js">
</script>

<script src="app.js"></script>

</body>
</html>
